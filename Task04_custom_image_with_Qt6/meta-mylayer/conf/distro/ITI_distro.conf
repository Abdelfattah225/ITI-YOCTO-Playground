require conf/distro/poky.conf

DISTRO = "ITI_distro"
DISTRO_NAME = "ITI_distro (Abdelfattah Reference Distro)"
TARGET_VENDOR = "-rpi3b"

DISTRO_FEATURES:append = " systemd usrmerge wifi opengl dbus"

VIRTUAL-RUNTIME_init_manager = "systemd"
