# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-rpi-3b-plus-BSP"
BBFILE_PATTERN_meta-rpi-3b-plus-BSP = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-rpi-3b-plus-BSP = "6"

LAYERDEPENDS_meta-rpi-3b-plus-BSP = "core"
LAYERSERIES_COMPAT_meta-rpi-3b-plus-BSP = "scarthgap"
